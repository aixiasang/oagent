<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>禅心AI - 智慧对话</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .zen-container {
            width: 90%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 80vh;
        }

        .zen-header {
            background: linear-gradient(45deg, #d4af37, #f4e4bc);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #d4af37;
        }

        .zen-icons {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 15px;
        }

        .zen-icon {
            width: 60px;
            height: 60px;
            background: rgba(212, 175, 55, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .zen-icon:hover {
            transform: translateY(-5px);
            background: rgba(212, 175, 55, 0.4);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }

        .zen-icon-label {
            position: absolute;
            bottom: -25px;
            font-size: 12px;
            color: #8b7355;
            font-weight: 500;
        }

        .zen-motto {
            color: #8b7355;
            font-size: 16px;
            font-style: italic;
            margin-top: 10px;
        }

        .zen-motto::before {
            content: '🧘‍♂️';
            margin-right: 8px;
        }

        .zen-chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.8);
            margin: 20px;
            border-radius: 15px;
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: transparent;
        }

        .zen-input-container {
            background: rgba(244, 228, 188, 0.3);
            padding: 20px;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
        }

        .zen-input-form {
            display: flex;
            gap: 15px;
            align-items: flex-end;
            max-width: 100%;
            background: white;
            border-radius: 25px;
            padding: 10px 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .zen-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            resize: none;
            background: transparent;
            color: #5a5a5a;
            min-height: 24px;
            max-height: 120px;
            font-family: inherit;
        }

        .zen-input::placeholder {
            color: #b8a082;
            font-style: italic;
        }

        .zen-send-btn {
            background: linear-gradient(45deg, #d4af37, #f4e4bc);
            color: #8b7355;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 18px;
        }

        .zen-send-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }

        .zen-send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #d4af37, #f4e4bc);
            color: #8b7355;
            border: none;
            box-shadow: 0 3px 10px rgba(212, 175, 55, 0.3);
        }

        .message-content {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 20px;
            word-wrap: break-word;
            line-height: 1.6;
            font-size: 15px;
            position: relative;
        }

        .message.assistant .message-content {
            background: rgba(255, 255, 255, 0.9);
            color: #5a5a5a;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        .message.assistant .message-content::before {
            content: '🧘‍♂️';
            position: absolute;
            left: -35px;
            top: 15px;
            font-size: 20px;
        }

        .message.user .message-content::before {
            content: '🙏';
            position: absolute;
            right: -35px;
            top: 15px;
            font-size: 20px;
        }

        .message.tool .message-content {
            background: rgba(244, 228, 188, 0.5);
            color: #8b7355;
            border: 1px solid rgba(212, 175, 55, 0.3);
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }

        .reasoning-content {
            background: rgba(255, 243, 205, 0.8);
            border: 1px solid #d4af37;
            color: #8b7355;
            padding: 10px 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            font-size: 14px;
            font-style: italic;
        }

        .reasoning-content::before {
            content: '💭 ';
            font-style: normal;
        }

        .tool-content {
            background: rgba(240, 248, 240, 0.8);
            border: 1px solid #b8e6b8;
            color: #2d5a2d;
            padding: 10px 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            font-size: 14px;
            font-family: monospace;
        }

        .tool-call-content {
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            background-color: rgba(227, 242, 253, 0.8);
            padding: 10px;
            border-radius: 10px;
            margin-top: 8px;
            border-left: 3px solid #2196f3;
        }
        
        .tool-result-content {
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            background-color: rgba(232, 245, 232, 0.8);
            padding: 10px;
            border-radius: 10px;
            margin-top: 8px;
            border-left: 3px solid #4caf50;
        }

        .chat-input-container {
            padding: 24px;
            background: white;
            border-top: 1px solid #e5e7eb;
        }

        .chat-input-form {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            max-width: 768px;
            margin: 0 auto;
        }

        .chat-input {
            flex: 1;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 16px;
            resize: none;
            outline: none;
            transition: all 0.2s;
            max-height: 120px;
            min-height: 44px;
            background: white;
        }

        .chat-input:focus {
            border-color: #10a37f;
            box-shadow: 0 0 0 1px #10a37f;
        }

        .send-btn {
            background: #10a37f;
            color: white;
            border: none;
            border-radius: 8px;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
            font-size: 20px;
        }

        .send-btn:hover {
            background: #0d8f6b;
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: #d1d5db;
        }

        .typing-indicator {
            display: none;
            padding: 16px;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            max-width: 70%;
            margin-bottom: 24px;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #10a37f;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
        }

        /* 滚动条样式 */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 3px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .chat-container {
                width: 95%;
                height: 95vh;
                border-radius: 15px;
            }

            .message-content {
                max-width: 85%;
            }

            .chat-header h1 {
                font-size: 20px;
            }

            .clear-btn {
                padding: 6px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="zen-container">
        <!-- 禅意头部 -->
        <div class="zen-header">
            <div class="zen-icons">
                <div class="zen-icon" title="佛陀" onclick="selectMode('buddha')">
                    <svg width="40" height="40" viewBox="0 0 100 100" fill="currentColor">
                        <path d="M50 10 C30 10 15 25 15 45 C15 65 30 80 50 80 C70 80 85 65 85 45 C85 25 70 10 50 10 Z M50 20 C60 20 70 30 70 45 C70 60 60 70 50 70 C40 70 30 60 30 45 C30 30 40 20 50 20 Z"/>
                        <circle cx="45" cy="40" r="3"/>
                        <circle cx="55" cy="40" r="3"/>
                        <path d="M40 55 Q50 65 60 55" stroke="currentColor" stroke-width="2" fill="none"/>
                    </svg>
                    <div class="zen-label">佛陀</div>
                 </div>
                 
                <div class="zen-icon" title="禅师" onclick="selectMode('master')">
                     <svg width="40" height="40" viewBox="0 0 100 100" fill="currentColor">
                         <path d="M50 15 C35 15 25 25 25 40 L25 75 C25 80 30 85 35 85 L65 85 C70 85 75 80 75 75 L75 40 C75 25 65 15 50 15 Z"/>
                         <circle cx="42" cy="35" r="2"/>
                         <circle cx="58" cy="35" r="2"/>
                         <path d="M40 50 Q50 55 60 50" stroke="currentColor" stroke-width="1.5" fill="none"/>
                         <rect x="45" y="60" width="10" height="15" rx="2"/>
                     </svg>
                     <div class="zen-label">禅师</div>
                 </div>
                 
                <div class="zen-icon" title="小沙弥" onclick="selectMode('monk')">
                     <svg width="40" height="40" viewBox="0 0 100 100" fill="currentColor">
                         <circle cx="50" cy="35" r="20"/>
                         <circle cx="44" cy="30" r="2"/>
                         <circle cx="56" cy="30" r="2"/>
                         <path d="M42 42 Q50 48 58 42" stroke="currentColor" stroke-width="1.5" fill="none"/>
                         <rect x="40" y="50" width="20" height="30" rx="3"/>
                     </svg>
                     <div class="zen-label">小沙弥</div>
                 </div>
                 
                <div class="zen-icon" title="禅机" onclick="selectMode('wisdom')">
                     <svg width="40" height="40" viewBox="0 0 100 100" fill="currentColor">
                         <circle cx="50" cy="50" r="30" fill="none" stroke="currentColor" stroke-width="3"/>
                         <circle cx="50" cy="50" r="15" fill="none" stroke="currentColor" stroke-width="2"/>
                         <circle cx="50" cy="50" r="5"/>
                         <path d="M20 50 L35 50 M65 50 L80 50 M50 20 L50 35 M50 65 L50 80" stroke="currentColor" stroke-width="2"/>
                     </svg>
                     <div class="zen-label">禅机</div>
                 </div>
                 
                <div class="zen-icon" title="木鱼" onclick="selectMode('meditation')">
                     <svg width="40" height="40" viewBox="0 0 100 100" fill="currentColor">
                         <ellipse cx="50" cy="55" rx="25" ry="20"/>
                         <ellipse cx="50" cy="45" rx="20" ry="15" fill="none" stroke="white" stroke-width="2"/>
                         <rect x="45" y="25" width="10" height="15" rx="5"/>
                         <circle cx="50" cy="20" r="3"/>
                     </svg>
                     <div class="zen-label">木鱼</div>
                </div>
            </div>
            <div class="zen-motto" id="zenMotto">
                受尽九磨十难，了知世事无常。
            </div>
        </div>
        
        <!-- 聊天区域 -->
        <div class="zen-chat-area">
            <div class="chat-messages" id="chatMessages">
                <div class="message assistant">
                    <div class="message-content">
                        🙏 施主，贫僧在此等候多时，有何疑惑需要开解？
                    </div>
                </div>
            </div>
            
            <div class="typing-indicator" id="typingIndicator">
                <div class="typing-dots">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>
            
            <!-- 输入区域 -->
            <div class="zen-input-container">
                <form class="zen-input-form" onsubmit="sendMessage(event)">
                    <textarea 
                        class="zen-input" 
                        id="messageInput" 
                        placeholder="点击头像开启对话..."
                        rows="1"
                        onkeydown="handleKeyDown(event)"
                    ></textarea>
                    <button type="submit" class="zen-send-btn" id="sendBtn">
                        ➤
                    </button>
                </form>
            </div>
        </div>
        
        <!-- 功能按钮 -->
        <div style="position: absolute; top: 20px; right: 20px; display: flex; gap: 10px;">
            <button onclick="clearCurrentSession()" style="background: rgba(255,255,255,0.8); border: 1px solid #d4af37; color: #8b7355; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 12px;">🗑️ 轮转</button>
        </div>
    </div>

    <script>
        let isWaitingForResponse = false;
         let currentEventSource = null;
         const messageElements = new Map(); // 存储消息ID到DOM元素的映射
         let currentSessionId = null;
         let sessions = [];

        // 模式配置
        const zenModes = {
            buddha: {
                motto: '受尽九磨十难，了知世事无常。',
                placeholder: '施主有何疑惑，请开口相询...',
                greeting: '🙏 阿弥陀佛，施主，贫僧在此等候多时，有何疑惑需要开解？'
            },
            master: {
                motto: '禅心如水，静观万物。',
                placeholder: '弟子求教，师父请指点迷津...',
                greeting: '👨‍🏫 善哉善哉，有缘人来此求法，老衲愿为汝解惑。'
            },
            monk: {
                motto: '初心不改，道心永恒。',
                placeholder: '小僧有疑，请师兄指教...',
                greeting: '👶 师兄好，小僧初入佛门，还请多多指教。'
            },
            wisdom: {
                motto: '一花一世界，一叶一菩提。',
                placeholder: '参悟禅机，求解人生...',
                greeting: '🎋 万法皆空，因缘和合。施主欲参何机？'
            },
            meditation: {
                motto: '木鱼声声，唤醒迷途。',
                placeholder: '静心冥想，聆听内心...',
                greeting: '🥢 咚咚咚... 木鱼声起，心静自然凉。施主可有心事？'
            }
        };

        let currentMode = 'buddha';

        // 选择模式
        function selectMode(mode) {
            currentMode = mode;
            const config = zenModes[mode];
            
            // 更新格言
            document.getElementById('zenMotto').textContent = config.motto;
            
            // 更新输入框占位符
            document.getElementById('messageInput').placeholder = config.placeholder;
            
            // 清空聊天记录并显示新的问候语
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.innerHTML = `
                <div class="message assistant">
                    <div class="message-content">
                        ${config.greeting}
                    </div>
                </div>
            `;
            
            // 高亮选中的图标
            document.querySelectorAll('.zen-icon').forEach(icon => {
                icon.style.background = 'rgba(212, 175, 55, 0.2)';
            });
            event.target.closest('.zen-icon').style.background = 'rgba(212, 175, 55, 0.6)';
        }

        // 页面初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化默认模式
            selectMode('buddha');
            
            // 设置第一个图标为选中状态
            document.querySelector('.zen-icon').style.background = 'rgba(212, 175, 55, 0.6)';
        });

        // 自动调整输入框高度
        const messageInput = document.getElementById('messageInput');
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // 处理键盘事件
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage(event);
            }
        }

        // 发送消息
        function sendMessage(event) {
            event.preventDefault();
            
            if (isWaitingForResponse) {
                return;
            }

            const messageInput = document.getElementById('messageInput');
            const message = messageInput.value.trim();
            
            if (!message) {
                return;
            }

            // 添加用户消息到界面
            const userMessageElement = addMessage('user', message);
            // 用户消息通常不需要ID管理，因为它们不会被更新
            
            // 清空输入框
            messageInput.value = '';
            messageInput.style.height = 'auto';
            
            // 显示正在输入指示器
            showTypingIndicator();
            
            // 禁用发送按钮
            setInputState(false);
            
            // 发送请求
            sendToServer(message);
        }

        // 发送到服务器
        function sendToServer(message) {
            // 检查是否有有效的会话ID
            if (!currentSessionId) {
                console.error('没有有效的会话ID');
                showError('会话未初始化，请刷新页面重试');
                setInputState(true);
                hideTypingIndicator();
                return;
            }
            
            // 关闭之前的连接
            if (currentEventSource) {
                currentEventSource.close();
                currentEventSource = null;
            }

            // 使用fetch进行流式请求
            fetch('/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ 
                    message: message,
                    session_id: currentSessionId 
                })
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                function readStream() {
                    return reader.read().then(({ done, value }) => {
                        if (done) {
                            hideTypingIndicator();
                            setInputState(true);
                            return;
                        }
                        
                        const chunk = decoder.decode(value);
                        const lines = chunk.split('\n');
                        
                        for (const line of lines) {
                            if (line.trim() && line.startsWith('data: ')) {
                                try {
                                    const jsonStr = line.slice(6).trim();
                                    if (jsonStr) {
                                        const data = JSON.parse(jsonStr);
                                        
                                        // 基于消息ID获取或创建消息元素
                        let messageElement = null;
                        if (data.id) {
                            messageElement = messageElements.get(data.id);
                            if (!messageElement) {
                                // 根据角色创建新的消息气泡
                                const role = data.role || 'assistant';
                                messageElement = addMessage(role, '', data.id);
                                messageElements.set(data.id, messageElement);
                            }
                        }
                        
                        // 简化的消息处理逻辑 - 后端已经格式化好数据
                        if (data.type === 'reasoning') {
                            // 推理内容处理
                            if (messageElement) {
                                let reasoningElement = messageElement.querySelector('.reasoning-content');
                                if (!reasoningElement) {
                                    reasoningElement = document.createElement('div');
                                    reasoningElement.className = 'reasoning-content';
                                    messageElement.querySelector('.message-content').appendChild(reasoningElement);
                                }
                                reasoningElement.textContent += data.content;
                            }
                        } else if (data.type === 'content') {
                            // 正常内容处理
                            if (messageElement) {
                                const contentElement = messageElement.querySelector('.message-content');
                                const existingContent = contentElement.lastChild;
                                
                                if (existingContent && existingContent.nodeType === Node.TEXT_NODE) {
                                    existingContent.textContent += data.content;
                                } else {
                                    contentElement.appendChild(document.createTextNode(data.content));
                                }
                            }
                        } else if (data.type === 'tool_call') {
                            // 处理工具调用消息
                            if (messageElement) {
                                const toolCallElement = messageElement.querySelector('.tool-call-content');
                                if (toolCallElement) {
                                    toolCallElement.textContent = data.content;
                                } else {
                                    const newToolCallElement = document.createElement('div');
                                    newToolCallElement.className = 'tool-call-content';
                                    newToolCallElement.textContent = data.content;
                                    messageElement.querySelector('.message-content').appendChild(newToolCallElement);
                                }
                            }
                        } else if (data.type === 'tool_result') {
                            // 处理工具结果消息
                            const messageId = data.tool_call_id || data.id;
                            if (messageElements.has(messageId)) {
                                const messageElement = messageElements.get(messageId);
                                const toolResultElement = messageElement.querySelector('.tool-result-content');
                                if (toolResultElement) {
                                    toolResultElement.textContent = data.content;
                                } else {
                                    const newToolResultElement = document.createElement('div');
                                    newToolResultElement.className = 'tool-result-content';
                                    newToolResultElement.textContent = data.content;
                                    messageElement.querySelector('.message-content').appendChild(newToolResultElement);
                                }
                            } else {
                                const messageElement = addMessage('tool', data.content, messageId);
                                messageElements.set(messageId, messageElement);
                            }
                        } else if (data.type === 'tool') {
                            // 工具消息处理 - 直接使用后端格式化的内容
                            if (messageElement) {
                                const contentElement = messageElement.querySelector('.message-content');
                                if (contentElement) {
                                    contentElement.textContent = data.content; // 后端已经格式化好的内容
                                }
                            }
                        } else if (data.type === 'error') {
                                            showError(data.content);
                                            hideTypingIndicator();
                                            setInputState(true);
                                            return;
                                        } else if (data.type === 'end') {
                                            hideTypingIndicator();
                                            setInputState(true);
                                            return;
                                        }
                                        
                                        scrollToBottom();
                                    }
                                } catch (e) {
                                    console.error('解析JSON失败:', e, '原始行:', line);
                                }
                            }
                        }
                        
                        return readStream();
                    });
                }
                
                hideTypingIndicator();
                return readStream();
            })
            .catch(error => {
                console.error('请求失败:', error);
                showError('连接服务器失败，请检查网络连接');
                hideTypingIndicator();
                setInputState(true);
            });
        }

        // 添加消息到界面
        function addMessage(role, content, messageId = null) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            // 如果有消息ID，设置为data属性
            if (messageId) {
                messageDiv.setAttribute('data-message-id', messageId);
            }
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            if (content) {
                contentDiv.textContent = content;
            }
            
            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);
            
            scrollToBottom();
            return messageDiv;
        }

        // 显示错误消息
        function showError(message) {
            const chatMessages = document.getElementById('chatMessages');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = `❌ ${message}`;
            chatMessages.appendChild(errorDiv);
            scrollToBottom();
        }

        // 显示正在输入指示器
        function showTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            indicator.style.display = 'block';
            scrollToBottom();
        }

        // 隐藏正在输入指示器
        function hideTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            indicator.style.display = 'none';
        }

        // 设置输入状态
        function setInputState(enabled) {
            isWaitingForResponse = !enabled;
            const sendBtn = document.getElementById('sendBtn');
            const messageInput = document.getElementById('messageInput');
            
            sendBtn.disabled = !enabled;
            messageInput.disabled = !enabled;
            
            if (enabled) {
                messageInput.focus();
            }
        }

        // 滚动到底部
        function scrollToBottom() {
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // 清空对话
        function clearChat() {
            if (confirm('确定要清空所有对话吗？')) {
                fetch('/clear', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        // 清空消息ID映射
                        messageElements.clear();
                        
                        const chatMessages = document.getElementById('chatMessages');
                        chatMessages.innerHTML = `
                            <div class="message assistant">
                                <div class="message-content">
                                    👋 你好！我是你的AI助手，有什么可以帮助你的吗？
                                </div>
                            </div>
                        `;
                    } else {
                        showError(data.error || '清空失败');
                    }
                })
                .catch(error => {
                    console.error('清空失败:', error);
                    showError('清空对话失败');
                });
            }
        }

        // 同步会话状态
        async function syncSessionState() {
            try {
                const response = await fetch('/current-session');
                if (response.ok) {
                    const data = await response.json();
                    const serverSessionId = data.current_session_id;
                    
                    // 如果服务器的当前会话与本地不同，同步状态
                    if (serverSessionId !== currentSessionId) {
                        currentSessionId = serverSessionId;
                        
                        // 清空聊天消息
                        clearChatMessages();
                        
                        // 如果有当前会话，加载消息
                        if (currentSessionId) {
                            await loadSessionMessages(currentSessionId);
                        } else if (!data.has_sessions) {
                            // 如果没有会话，显示欢迎信息
                            const messagesContainer = document.getElementById('messages');
                            messagesContainer.innerHTML = '<div class="message assistant"><div class="message-content">欢迎使用！请创建一个新会话开始对话。</div></div>';
                        }
                        
                        // 重新加载会话列表
                        await loadSessions();
                    }
                }
            } catch (error) {
                console.error('同步会话状态失败:', error);
            }
        }

        // 页面可见性变化时同步状态
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                syncSessionState();
            }
        });

        // 页面获得焦点时同步状态
        window.addEventListener('focus', function() {
            syncSessionState();
        });

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadSessions();
            
            // 绑定发送按钮事件
            document.getElementById('sendBtn').addEventListener('click', sendMessage);
            
            // 绑定输入框回车事件
            document.getElementById('messageInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            
            // 定期同步会话状态（每30秒）
            setInterval(syncSessionState, 30000);
            
            document.getElementById('messageInput').focus();
        });

        // 加载会话列表
        async function loadSessions() {
            try {
                const response = await fetch('/sessions');
                const data = await response.json();
                sessions = data.sessions;
                currentSessionId = data.current_session_id;
                renderSessionsList();
                updateChatTitle();
            } catch (error) {
                console.error('加载会话列表失败:', error);
            }
        }

        // 渲染会话列表
        function renderSessionsList() {
            const sessionsList = document.getElementById('sessionsList');
            sessionsList.innerHTML = '';
            
            sessions.forEach(session => {
                const sessionItem = document.createElement('div');
                sessionItem.className = `session-item ${session.id === currentSessionId ? 'active' : ''}`;
                sessionItem.onclick = () => switchSession(session.id);
                
                sessionItem.innerHTML = `
                    <div class="session-title">${session.title}</div>
                    <div class="session-time">${formatTime(session.created_at)}</div>
                    <div class="session-actions">
                        <button class="session-action-btn" onclick="event.stopPropagation(); editSessionTitle('${session.id}', '${session.title}')">✏️</button>
                        <button class="session-action-btn" onclick="event.stopPropagation(); deleteSession('${session.id}')">🗑️</button>
                    </div>
                `;
                
                sessionsList.appendChild(sessionItem);
            });
        }

        // 创建新会话
        async function createNewSession() {
            try {
                const response = await fetch('/sessions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({})
                });
                
                if (response.ok) {
                    const newSession = await response.json();
                    // 后端返回的是session_id字段，不是id字段
                    await switchSession(newSession.session_id);
                }
            } catch (error) {
                console.error('创建新会话失败:', error);
            }
        }

        // 切换会话
        async function switchSession(sessionId) {
            if (!sessionId || sessionId === 'undefined') {
                console.error('无效的会话ID:', sessionId);
                return;
            }
            
            try {
                const response = await fetch(`/sessions/${sessionId}/switch`, {
                    method: 'POST'
                });
                
                if (response.ok) {
                    currentSessionId = sessionId;
                    
                    // 清空当前聊天消息
                    clearChatMessages();
                    
                    // 加载会话消息
                    await loadSessionMessages(sessionId);
                    
                    // 更新会话列表显示
                    await loadSessions();
                }
            } catch (error) {
                console.error('切换会话失败:', error);
            }
        }

        // 删除会话
        async function deleteSession(sessionId) {
            if (!confirm('确定要删除这个会话吗？')) {
                return;
            }
            
            try {
                const response = await fetch(`/sessions/${sessionId}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    const result = await response.json();
                    
                    // 更新当前会话ID
                    currentSessionId = result.current_session_id;
                    
                    // 清空聊天消息
                    clearChatMessages();
                    
                    // 如果还有会话，加载当前会话的消息
                    if (result.has_sessions && currentSessionId) {
                        await loadSessionMessages(currentSessionId);
                    }
                    
                    // 重新加载会话列表
                    await loadSessions();
                    
                    // 如果没有会话了，显示欢迎信息
                    if (!result.has_sessions) {
                        const messagesContainer = document.getElementById('messages');
                        messagesContainer.innerHTML = '<div class="message assistant"><div class="message-content">欢迎使用！请创建一个新会话开始对话。</div></div>';
                    }
                }
            } catch (error) {
                console.error('删除会话失败:', error);
            }
        }

        // 编辑会话标题
        async function editSessionTitle(sessionId, currentTitle) {
            const newTitle = prompt('请输入新的会话标题:', currentTitle);
            if (newTitle && newTitle !== currentTitle) {
                try {
                    const response = await fetch(`/sessions/${sessionId}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ title: newTitle })
                    });
                    
                    if (response.ok) {
                        await loadSessions();
                    }
                } catch (error) {
                    console.error('更新会话标题失败:', error);
                }
            }
        }

        // 清空当前会话
        async function clearCurrentSession() {
            if (!currentSessionId) {
                console.error('没有当前会话');
                return;
            }
            
            if (!confirm('确定要清空当前会话的所有消息吗？')) {
                return;
            }
            
            try {
                const response = await fetch(`/sessions/${currentSessionId}/clear`, {
                    method: 'POST'
                });
                
                if (response.ok) {
                    clearChatMessages();
                }
            } catch (error) {
                console.error('清空会话失败:', error);
            }
        }

        // 更新聊天标题
        function updateChatTitle() {
            const currentSession = sessions.find(s => s.id === currentSessionId);
            const titleElement = document.getElementById('chatTitle');
            if (currentSession) {
                titleElement.textContent = `🤖 ${currentSession.title}`;
            } else {
                titleElement.textContent = '🤖 AI 聊天助手';
            }
        }

        // 格式化时间
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) { // 1分钟内
                return '刚刚';
            } else if (diff < 3600000) { // 1小时内
                return `${Math.floor(diff / 60000)}分钟前`;
            } else if (diff < 86400000) { // 24小时内
                return `${Math.floor(diff / 3600000)}小时前`;
            } else {
                return date.toLocaleDateString();
            }
        }

        // 清空聊天消息显示
        function clearChatMessages() {
            document.getElementById('chatMessages').innerHTML = '';
            messageElements.clear();
        }

        // 页面加载完成后聚焦输入框
        window.addEventListener('load', function() {
            document.getElementById('messageInput').focus();
        });

        // 清空聊天 (保留向后兼容性)
        function clearChat() {
            clearCurrentSession();
        }
    </script>
</body>
</html>
